<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Just Rentals</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family:Arial;margin:0;background:#f5f7fa;}
header {background:#1e3a8a;color:white;text-align:center;padding:20px;}
.container {padding:20px;}
.card {background:white;padding:10px;margin:10px 0;border-radius:10px;}
img {width:100%;border-radius:10px;}
.btn {background:#1e3a8a;color:white;padding:10px;border:none;margin-top:5px;cursor:pointer;}
input {width:100%;padding:10px;margin:5px 0;}
</style>
</head>

<body>

<header>
<h1>Just Rentals</h1>
<p>Your Space, Our Responsibility</p>
</header>

<div class="container">

<!-- ADMIN LOGIN -->
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
<h3>Add Property</h3>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="type" placeholder="Type">
<input type="file" id="images" multiple>

<button class="btn" onclick="addProperty()">Add Listing</button>
</div>

<!-- LISTINGS -->
<h2>Listings</h2>
<div id="list"></div>

</div>

<script>
// 🔴 PASTE YOUR DETAILS HERE
const supabase = supabase.createClient(
  "https://evpwzyyvsruakrsyoxii.supabase.co",
  "sb_publishable_u-8Rqa9VG9ZmwOuwLfkK2w_ULtHLmvJ"
);

// LOGIN
async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){ alert("Login failed"); return; }

  document.getElementById("adminPanel").style.display="block";
}

// ADD PROPERTY
async function addProperty(){
  let files = document.getElementById("images").files;
  let urls = [];

  for(let file of files){
    let fileName = Date.now() + file.name;

    await supabase.storage
      .from("property-images")
      .upload(fileName, file);

    let { data } = supabase.storage
      .from("property-images")
      .getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  await supabase.from("properties").insert([{
    title: title.value,
    price: price.value,
    type: type.value,
    images: urls.join(","),
    rating: 0
  }]);

  alert("Added!");
  loadProperties();
}

// LOAD PROPERTIES
async function loadProperties(){
  let { data } = await supabase.from("properties").select("*");

  let html = "";
  data.forEach(p => {
    let img = p.images.split(",")[0];

    html += `
    <div class="card">
      <img src="${img}">
      <h3>${p.title}</h3>
      <p>${p.price}</p>
      <p>${p.type}</p>
      <button class="btn" onclick="rate(${p.id})">⭐ Rate</button>
      <button class="btn" onclick="window.open('https://wa.me/919606247919')">Enquire</button>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

// RATE
async function rate(id){
  let val = prompt("Rate 1-5");
  if(!val) return;

  await supabase.from("properties").update({rating: val}).eq("id", id);
  loadProperties();
}

// LOAD ON START
loadProperties();
</script>

</body>
</html>
